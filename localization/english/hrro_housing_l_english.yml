l_english:
 rented_housing: "Rental Housing"
 rented_housing_desc: "Residential rental services consumed mainly by low and middle-wealth pops. This is a local good whose price is determined within each state."
 owned_housing: "Owned Housing"
 owned_housing_desc: "Residential ownership services representing mortgages, maintenance, management, and the service costs tied to property ownership. This is a local good whose price is determined within each state."
 popneed_rented_housing: "Rental Housing"
 popneed_owned_housing: "Owned Housing"

 building_hrro_rental_developer: "Rental Housing Developer"
 building_hrro_rental_developer_desc: "Develops and manages rental housing for urban workers and the lower middle class."
 building_hrro_rental_developer_lens_option: "Expand Rental Housing Developer"
 building_hrro_owned_developer: "Residential Property Developer"
 building_hrro_owned_developer_desc: "Develops properties for sale and coordinates the financing, furnishing, and servicing of privately owned homes."
 building_hrro_owned_developer_lens_option: "Expand Residential Property Developer"

 pmg_hrro_rental_construction: "Construction Method"
 pmg_hrro_rental_ownership: "Ownership Structure"
 pmg_hrro_owned_construction: "Construction Method"
 pmg_hrro_owned_ownership: "Ownership Structure"

 pm_hrro_tenement: "Tenement Construction"
 pm_hrro_tenement_desc: "Basic low-cost rental blocks built mostly from wood, with only minimal furnishing."
 pm_hrro_apartment: "Apartment Block Construction"
 pm_hrro_apartment_desc: "Urban apartment blocks using glass, steel, and modest interior furnishing to expand rental supply."
 pm_hrro_highrise_rental: "High-Rise Rental Construction"
 pm_hrro_highrise_rental_desc: "Dense high-rise rental towers with better materials and modest electric infrastructure."

 pm_hrro_rowhouse: "Row House Development"
 pm_hrro_rowhouse_desc: "Entry-level owner-occupied housing with simple furnishing and modest construction requirements."
 pm_hrro_suburban_villa: "Suburban Villa Development"
 pm_hrro_suburban_villa_desc: "Mid-tier owner housing with better furnishing, porcelain household goods, and light service-sector support."
 pm_hrro_luxury_estate: "Luxury Estate Development"
 pm_hrro_luxury_estate_desc: "High-end owner housing driven by luxury furnishing, porcelain consumption, electric upkeep, and a large service-sector component."

 pm_hrro_rental_privately_owned: "Private Landlord"
 pm_hrro_rental_privately_owned_desc: "Rental housing owned by private landlords and management companies."
 pm_hrro_rental_publicly_owned: "State Housing Authority"
 pm_hrro_rental_publicly_owned_desc: "Rental housing managed by the state rather than private landlords."
 pm_hrro_owned_privately_owned: "Private Developer"
 pm_hrro_owned_privately_owned_desc: "Privately owned real-estate development firms sell homes and capture property profits."
 pm_hrro_owned_publicly_traded: "Publicly Traded Property Company"
 pm_hrro_owned_publicly_traded_desc: "A listed property company with wider investor participation and slightly higher output efficiency."

 modifier_goods_output_rented_housing_add:0 "@rented_housing! Rental Housing Output per Level"
 modifier_goods_output_rented_housing_add_desc:0 "Modifies the amount of @rented_housing! Rental Housing produced per building level."
 modifier_goods_output_owned_housing_add:0 "@owned_housing! Owned Housing Output per Level"
 modifier_goods_output_owned_housing_add_desc:0 "Modifies the amount of @owned_housing! Owned Housing produced per building level."
 modifier_goods_output_rented_housing_mult:0 "@rented_housing! Rental Housing Output"
 modifier_goods_output_rented_housing_mult_desc:0 "Percentage modifier to @rented_housing! Rental Housing output."
 modifier_goods_output_owned_housing_mult:0 "@owned_housing! Owned Housing Output"
 modifier_goods_output_owned_housing_mult_desc:0 "Percentage modifier to @owned_housing! Owned Housing output."
